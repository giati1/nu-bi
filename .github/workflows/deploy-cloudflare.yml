name: Deploy Cloudflare Preview

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or commit SHA to deploy
        required: true
        default: main
        type: string

concurrency:
  group: cloudflare-preview-deploy
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run adapter patch
        run: node scripts/patch-opennext-cloudflare.mjs

      - name: Verify patch
        run: node scripts/patch-opennext-cloudflare.mjs --verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Build Cloudflare worker bundle
        run: npm run cf:build

      - name: Deploy preview Worker
        run: npm run cf:deploy:preview
