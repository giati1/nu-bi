name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply OpenNext compatibility patch
        run: npm run cf:patch-adapter

      - name: Verify patched OpenNext adapter
        run: |
          node -e "const fs=require('fs'); const file='node_modules/@opennextjs/cloudflare/dist/cli/index.mjs'; const text=fs.readFileSync(file,'utf8'); const marker='const incrementalCacheHandlerPath = \"./\" + cacheHandlerFileBase + \".cjs\";'; if (!text.includes(marker)) { throw new Error('OpenNext compatibility patch missing'); } console.log('OpenNext compatibility patch verified.');"

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Build Cloudflare worker bundle
        run: npm run cf:build
