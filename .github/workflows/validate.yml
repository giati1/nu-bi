name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run adapter patch
        run: node scripts/patch-opennext-cloudflare.mjs

      - name: Verify patch
        run: node scripts/patch-opennext-cloudflare.mjs --verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Build Cloudflare worker bundle
        run: npm run cf:build
